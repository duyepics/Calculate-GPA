<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tính GPA Mục Tiêu</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#F8F9FA] min-h-screen \ font-sans text-gray-900">
    <div id="app-navbar"></div>
    <div class="max-w-2xl mx-auto space-y-8">
      
        <header class="text-center md:text-left space-y-2">
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-gray-900">
                TÍNH ĐIỂM GPA MỤC TIÊU
            </h1>
            <p class="text-gray-500 text-base md:text-lg">
                Dự tính số điểm trung bình cần đạt cho các môn sắp tới dựa trên tín chỉ đã học.
            </p>
        </header>
        <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 flex flex-col">
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tổng tín chỉ đã học</label>
                    <input type="number" id="oldCredits"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                        placeholder="VD: 80">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">GPA hiện tại (Hệ 4)</label>
                    <input type="number" id="oldGPA" step="0.01"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                        placeholder="VD: 2.8">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Số tín chỉ sắp học</label>
                    <input type="number" id="newCredits"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                        placeholder="VD: 15">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">GPA mục tiêu (Hệ 4)</label>
                    <input type="number" id="targetGPA" step="0.01"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                        placeholder="VD: 3.0">
                </div>
                <button id="btnCalculateTarget"
                    class="w-full mt-4 bg-blue-600 text-white px-4 py-4 rounded-xl font-semibold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-95 text-lg">
                    Tính điểm cần đạt
                </button>
                <div id="targetResultBox" class="hidden mt-6 p-6 rounded-xl text-center border">
                    <span class="block text-sm text-gray-600 mb-2">Trung bình các môn tới cần đạt:</span>
                    <span id="targetResultText" class="text-4xl font-bold text-blue-600"></span>
                    <p id="targetMessage" class="mt-3 text-sm font-medium"></p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
